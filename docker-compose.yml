services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/skypulse.db
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY}
    volumes:
      - ./data:/data
    restart: unless-stopped
